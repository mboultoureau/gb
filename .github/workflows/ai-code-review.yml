name: Multi-Model AI Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  gemini-review:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Run PR Agent (Gemini)
        uses: The-PR-Agent/pr-agent@main
        env:
          OPENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_BASE: "https://generativelanguage.googleapis.com/v1beta/openai/"
          OPENAI_MODEL: "gemini-2.5-flash"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  openrouter-review:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Run Open-Rabbit (DeepSeek)
        uses: stwise/open-rabbit@main
        env:
          AI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_BASE_URL: "https://openrouter.ai/api/v1"
          AI_MODEL: "deepseek/deepseek-chat:free"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
